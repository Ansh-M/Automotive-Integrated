services:
  autoverse-ai:
    image: anshmundra/autoverse-ai:latest
    ports:
      - "8501:8501"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - GROQ_MODEL=llama-3.1-8b-instant
      - CHROMA_PERSIST_DIR=/app/.chroma
      - CHROMA_CACHE_DIR=/app/.chroma_cache
    volumes:
      - autoverse_chroma:/app/.chroma
    restart: unless-stopped

volumes:
  autoverse_chroma:
