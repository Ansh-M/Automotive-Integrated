services:
  autoverse-ai:
    build: .
    image: anshmundra/autoverse-ai:latest
    ports:
      - "8501:8501"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL}
      - CHROMA_PERSIST_DIR=/app/.chroma
      - CHROMA_CACHE_DIR=/app/.chroma_cache
      - HOME=/app
    volumes:
      - autoverse_chroma:/app/.chroma
      - autoverse_onnx:/app/.cache
    restart: unless-stopped

volumes:
  autoverse_chroma:
  autoverse_onnx:
