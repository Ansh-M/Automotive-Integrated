apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoverse-ai
  labels:
    app: autoverse-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autoverse-ai
  template:
    metadata:
      labels:
        app: autoverse-ai
    spec:
      containers:
        - name: autoverse-ai
          image: DOCKER_USERNAME/autoverse-ai:latest
          ports:
            - containerPort: 8501
          env:
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: autoverse-secrets
                  key: GROQ_API_KEY
            - name: TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: autoverse-secrets
                  key: TAVILY_API_KEY
            - name: GROQ_MODEL
              value: "llama-3.1-8b-instant"
            - name: CHROMA_PERSIST_DIR
              value: "/app/.chroma"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: autoverse-ai-service
spec:
  selector:
    app: autoverse-ai
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8501
  type: NodePort
