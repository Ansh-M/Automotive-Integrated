apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoverse-ai
  namespace: autoverse-ai
  labels:
    app: autoverse-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autoverse-ai
  strategy:
    type: Recreate       
  template:
    metadata:
      labels:
        app: autoverse-ai
    spec:
     
      initContainers:
        - name: init-dirs
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /app/.chroma /app/.chroma_cache && chmod -R 777 /app/.chroma /app/.chroma_cache"]
          volumeMounts:
            - name: chroma-storage
              mountPath: /app/.chroma
            - name: onnx-cache
              mountPath: /app/.chroma_cache

      containers:
        - name: autoverse-ai
          image: anshmundra/autoverse-ai:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8501
              name: streamlit

         
          envFrom:
            - configMapRef:
                name: autoverse-config
          env:
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: autoverse-secrets
                  key: GROQ_API_KEY
            - name: TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: autoverse-secrets
                  key: TAVILY_API_KEY

          
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "750m"

          
          startupProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            failureThreshold: 18
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5

         
          volumeMounts:
            - name: chroma-storage
              mountPath: /app/.chroma
            - name: onnx-cache
              mountPath: /app/.chroma_cache

      volumes:
        - name: chroma-storage
          persistentVolumeClaim:
            claimName: autoverse-chroma-pvc
        - name: onnx-cache
          persistentVolumeClaim:
            claimName: autoverse-onnx-pvc
