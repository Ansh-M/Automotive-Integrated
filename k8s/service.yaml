apiVersion: v1
kind: Service
metadata:
  name: autoverse-ai-service
  namespace: autoverse-ai
  labels:
    app: autoverse-ai
spec:
  type: NodePort
  selector:
    app: autoverse-ai
  ports:
    - name: streamlit
      protocol: TCP
      port: 80          # cluster-internal port
      targetPort: 8501  # container port
      nodePort: 30501   # fixed port on the Minikube VM (30000–32767)
